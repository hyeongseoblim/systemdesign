spring:
  application:
    name: jobstudy-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jobstudy}
    username: ${DB_USER:jobstudy}
    password: ${DB_PASSWORD:jobstudy}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

# CORS: 프론트(Vercel/로컬) 허용. Phase 3에서 도메인 확정 후 좁힘
app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

logging:
  level:
    org.flywaydb: INFO
